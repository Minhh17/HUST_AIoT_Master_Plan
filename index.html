<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kế hoạch & Điểm số Thạc sĩ AIoT</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const COURSES = [
            { id: 'SS6010', name: 'Triết học', credits: 3, category: 'chung', required: true },
            { id: 'DX6000', name: 'Đồ án nghiên cứu đề xuất', credits: 6, category: 'rong' },
            { id: 'IT4210', name: 'Hệ nhúng', credits: 3, category: 'rong' },
            { id: 'IT4735', name: 'IoT và ứng dụng', credits: 2, category: 'rong' },
            { id: 'IT4931', name: 'Lưu trữ và xử lý dữ liệu lớn', credits: 3, category: 'rong' },
            { id: 'IT4263', name: 'An ninh mạng', credits: 3, category: 'rong' },
            { id: 'IT4025', name: 'Mật mã ứng dụng', credits: 3, category: 'rong' },
            { id: 'IT5208', name: 'Thống kê ứng dụng', credits: 3, category: 'nangcao' },
            { id: 'IT6820', name: 'Kiến trúc máy tính tiên tiến', credits: 2, category: 'nangcao' },
            { id: 'IT4922', name: 'Mạng thế hệ sau', credits: 2, category: 'nangcao' },
            { id: 'IT5320', name: 'An toàn thông tin cho IoT', credits: 2, category: 'nangcao' },
            { id: 'IT5421', name: 'Chuyên đề nghiên cứu 1', credits: 3, category: 'nangcao' },
            { id: 'IT5422', name: 'Chuyên đề nghiên cứu 2', credits: 3, category: 'nangcao' },
            { id: 'IT5310', name: 'Các công nghệ truyền thông cho IoT', credits: 3, category: 'aiot', required: true },
            { id: 'IT4653', name: 'Học sâu và ứng dụng', credits: 2, category: 'aiot', required: true },
            { id: 'IT5427', name: 'Tích hợp và Xử lý dữ liệu lớn', credits: 3, category: 'aiot', required: true },
            { id: 'IT6130', name: 'Lập trình và ảo hóa cho IoT', credits: 2, category: 'aiot', required: true },
            { id: 'IT5425', name: 'Quản trị dữ liệu và trực quan hóa', credits: 2, category: 'aiot', required: true },
            { id: 'IT5409', name: 'Thị giác máy tính', credits: 3, category: 'aiot', required: true },
            { id: 'LV6001', name: 'Luận văn thạc sỹ', credits: 15, category: 'luanvan', required: true },
        ];

        const CATEGORIES = [
            { id: 'chung', name: 'Kiến thức chung', required: 3, color: 'bg-slate-500', text: 'text-slate-700', bg: 'bg-slate-100' },
            { id: 'rong', name: 'Kiến thức ngành rộng', required: 12, color: 'bg-blue-500', text: 'text-blue-700', bg: 'bg-blue-50' },
            { id: 'nangcao', name: 'Ngành nâng cao', required: 15, color: 'bg-purple-500', text: 'text-purple-700', bg: 'bg-purple-50' },
            { id: 'aiot', name: 'Mô-đun AIoT', required: 15, color: 'bg-emerald-500', text: 'text-emerald-700', bg: 'bg-emerald-50' },
            { id: 'luanvan', name: 'Luận văn tốt nghiệp', required: 15, color: 'bg-amber-500', text: 'text-amber-700', bg: 'bg-amber-50' },
        ];

        function App() {
            // Lấy dữ liệu từ LocalStorage (Nếu có)
            const [plannedCourses, setPlannedCourses] = useState(() => {
                const saved = localStorage.getItem('hust_aiot_data');
                return saved ? JSON.parse(saved) : {};
            });
            const [activeTab, setActiveTab] = useState('all');

            // Lưu dữ liệu vào LocalStorage mỗi khi có thay đổi
            useEffect(() => {
                localStorage.setItem('hust_aiot_data', JSON.stringify(plannedCourses));
            }, [plannedCourses]);

            // Tính toán thống kê tín chỉ và GPA
            const stats = useMemo(() => {
                const current = { total: 0, categories: {}, gpaTotalScore: 0, gpaTotalCredits: 0 };
                CATEGORIES.forEach(c => current.categories[c.id] = 0);

                Object.entries(plannedCourses).forEach(([courseId, data]) => {
                    const course = COURSES.find(c => c.id === courseId);
                    if (course) {
                        current.total += course.credits;
                        current.categories[course.category] += course.credits;

                        // Nếu môn học đã được nhập điểm
                        if (data.grade !== '' && !isNaN(data.grade)) {
                            current.gpaTotalCredits += course.credits;
                            current.gpaTotalScore += parseFloat(data.grade) * course.credits;
                        }
                    }
                });

                current.gpa = current.gpaTotalCredits > 0 
                    ? (current.gpaTotalScore / current.gpaTotalCredits).toFixed(2) 
                    : '0.00';
                
                return current;
            }, [plannedCourses]);

            const addCourse = (courseId, semester = 1) => {
                setPlannedCourses(prev => ({ ...prev, [courseId]: { semester, grade: '' } }));
            };
            
            const removeCourse = (courseId) => {
                const newPlan = { ...plannedCourses };
                delete newPlan[courseId];
                setPlannedCourses(newPlan);
            };

            const changeSemester = (courseId, newSemester) => {
                setPlannedCourses(prev => ({ ...prev, [courseId]: { ...prev[courseId], semester: parseInt(newSemester) } }));
            };

            const updateGrade = (courseId, newGrade) => {
                setPlannedCourses(prev => ({ ...prev, [courseId]: { ...prev[courseId], grade: newGrade } }));
            };

            const isCoursePlanned = (courseId) => plannedCourses.hasOwnProperty(courseId);

            const semesterPlans = [1, 2, 3, 4].map(sem => ({
                semester: sem,
                courses: Object.entries(plannedCourses)
                    .filter(([_, data]) => data.semester === sem)
                    .map(([id, data]) => ({ ...COURSES.find(c => c.id === id), ...data }))
                    .filter(c => c.id) // Lọc bỏ undefined
            }));

            return (
                <div className="min-h-screen text-slate-900 font-sans p-4 md:p-8">
                    <header className="max-w-6xl mx-auto mb-8 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-red-600 p-3 rounded-lg text-white">
                                <i className="fas fa-graduation-cap text-2xl"></i>
                            </div>
                        </div>
                        {/* Hiển thị GPA */}
                        <div className="bg-indigo-600 text-white px-5 py-2 rounded-xl shadow-lg text-center">
                            <p className="text-xs uppercase tracking-wider font-bold opacity-80">GPA Hiện tại</p>
                            <p className="text-2xl font-black">{stats.gpa}</p>
                        </div>
                    </header>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Cột trái */}
                        <div className="lg:col-span-5 flex flex-col gap-6">
                            {/* Tiến độ tín chỉ */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                                <div className="flex justify-between items-end mb-4">
                                    <h2 className="text-lg font-bold flex items-center gap-2">
                                        <i className="fas fa-chart-pie text-indigo-500"></i> Tiến độ (Đăng ký)
                                    </h2>
                                    <span className="text-2xl font-black text-indigo-600">{stats.total}<span className="text-sm text-slate-400 font-medium">/60 TC</span></span>
                                </div>
                                <div className="space-y-3">
                                    {CATEGORIES.map(cat => (
                                        <div key={cat.id}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className="font-medium text-slate-700 flex items-center gap-1.5">
                                                    <div className={`w-2.5 h-2.5 rounded-full ${cat.color}`}></div>
                                                    {cat.name}
                                                </span>
                                                <span className="text-slate-500">{stats.categories[cat.id]} / {cat.required}</span>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                                <div className={`${cat.color} h-1.5 transition-all`} style={{ width: `${Math.min(100, (stats.categories[cat.id] / cat.required) * 100)}%` }}></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Danh mục môn */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex-1 flex flex-col h-[600px]">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <i className="fas fa-bookmark text-indigo-500"></i> Danh mục môn học
                                </h2>
                                
                                <div className="flex gap-2 overflow-x-auto pb-2 mb-4 scrollbar-hide border-b border-slate-100">
                                    <button onClick={() => setActiveTab('all')} className={`px-3 py-1.5 text-sm font-medium rounded-t-lg border-b-2 transition-colors whitespace-nowrap ${activeTab === 'all' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>Tất cả</button>
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} onClick={() => setActiveTab(cat.id)} className={`px-3 py-1.5 text-sm font-medium rounded-t-lg border-b-2 transition-colors whitespace-nowrap ${activeTab === cat.id ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-slate-500 hover:text-slate-700'}`}>{cat.name}</button>
                                    ))}
                                </div>

                                <div className="overflow-y-auto flex-1 pr-2 space-y-3 custom-scrollbar">
                                    {COURSES.filter(c => activeTab === 'all' || c.category === activeTab).map(course => {
                                        const cat = CATEGORIES.find(c => c.id === course.category);
                                        const isAdded = isCoursePlanned(course.id);
                                        
                                        return (
                                            <div key={course.id} className={`p-3 rounded-lg border transition-all ${isAdded ? 'border-slate-200 bg-slate-50 opacity-60' : `border-${cat.color.split('-')[1]}-200 bg-white hover:shadow-md`}`}>
                                                <div className="flex justify-between items-start">
                                                    <div className="flex-1 pr-3">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className={`text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-sm ${cat.bg} ${cat.text}`}>{cat.name}</span>
                                                        </div>
                                                        <h3 className={`font-semibold text-sm ${isAdded ? 'text-slate-500' : 'text-slate-800'}`}>{course.name}</h3>
                                                        <p className="text-xs text-slate-500 mt-1">{course.id} • {course.credits} Tín chỉ</p>
                                                    </div>
                                                    <button 
                                                        onClick={() => isAdded ? removeCourse(course.id) : addCourse(course.id)}
                                                        className={`shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors ${isAdded ? 'bg-slate-200 text-slate-500 hover:bg-red-100 hover:text-red-600' : 'bg-indigo-50 text-indigo-600 hover:bg-indigo-500 hover:text-white'}`}
                                                    >
                                                        <i className={`fas ${isAdded ? 'fa-check' : 'fa-plus'}`}></i>
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Cột phải: Bảng phân bổ & Nhập điểm */}
                        <div className="lg:col-span-7">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 h-full">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2 border-b border-slate-100 pb-4">
                                    <i className="fas fa-table-columns text-indigo-500"></i> Bảng học kỳ & Kết quả
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {semesterPlans.map(plan => {
                                        const totalSemCredits = plan.courses.reduce((sum, c) => sum + c.credits, 0);
                                        return (
                                            <div key={plan.semester} className="bg-slate-50 rounded-xl border border-slate-200 p-4 flex flex-col">
                                                <div className="flex justify-between items-center mb-3">
                                                    <h3 className="font-bold text-slate-700">Học kỳ {plan.semester}</h3>
                                                    <span className={`text-xs font-bold px-2 py-1 rounded-full ${totalSemCredits > 0 ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-200 text-slate-500'}`}>
                                                        {totalSemCredits} TC
                                                    </span>
                                                </div>
                                                
                                                <div className="flex-1 flex flex-col gap-2 min-h-[120px]">
                                                    {plan.courses.length === 0 ? (
                                                        <div className="flex-1 flex items-center justify-center border-2 border-dashed border-slate-200 rounded-lg bg-slate-50/50">
                                                            <p className="text-xs text-slate-400 font-medium">Chưa có môn học</p>
                                                        </div>
                                                    ) : (
                                                        plan.courses.map(course => {
                                                            const cat = CATEGORIES.find(c => c.id === course.category);
                                                            const isCompleted = course.grade !== '' && !isNaN(course.grade);

                                                            return (
                                                                <div key={course.id} className={`bg-white border ${isCompleted ? 'border-green-300 bg-green-50/30' : 'border-slate-200'} rounded-lg p-3 shadow-sm hover:border-indigo-300 transition-colors`}>
                                                                    <div className="flex justify-between">
                                                                        <div className="flex-1 pr-2">
                                                                            <div className="flex items-center gap-1.5 mb-1">
                                                                                <div className={`w-2 h-2 rounded-full ${cat.color}`}></div>
                                                                                <span className="text-[10px] text-slate-500 font-medium">{course.id}</span>
                                                                            </div>
                                                                            <h4 className="text-sm font-semibold text-slate-800 leading-tight">{course.name}</h4>
                                                                        </div>
                                                                        <button onClick={() => removeCourse(course.id)} className="text-slate-300 hover:text-red-500 transition-colors self-start">
                                                                            <i className="fas fa-trash-alt"></i>
                                                                        </button>
                                                                    </div>
                                                                    
                                                                    <div className="mt-3 pt-3 border-t border-slate-100 flex items-center justify-between gap-2">
                                                                        <select 
                                                                            value={plan.semester}
                                                                            onChange={(e) => changeSemester(course.id, e.target.value)}
                                                                            className="text-xs bg-slate-50 border border-slate-200 text-slate-600 rounded px-1.5 py-1 focus:outline-none focus:border-indigo-500 cursor-pointer w-20"
                                                                        >
                                                                            {[1, 2, 3, 4].map(s => <option key={s} value={s}>Kỳ {s}</option>)}
                                                                        </select>
                                                                        
                                                                        <div className="flex items-center gap-1">
                                                                            <span className="text-[10px] text-slate-500 font-medium">Điểm:</span>
                                                                            <input 
                                                                                type="number" 
                                                                                step="0.1"
                                                                                min="0"
                                                                                max="10"
                                                                                placeholder="-"
                                                                                value={course.grade}
                                                                                onChange={(e) => updateGrade(course.id, e.target.value)}
                                                                                className={`text-xs w-14 text-center border rounded px-1.5 py-1 focus:outline-none focus:ring-1 focus:ring-indigo-500 font-bold ${isCompleted ? 'border-green-400 text-green-700 bg-green-50' : 'border-slate-200'}`}
                                                                            />
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
