<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý Kế hoạch & Điểm số Thạc sĩ AIoT</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Dữ liệu đã được chuẩn hóa theo đúng cấu trúc của bạn
        const COURSES = [
            // Khối Bổ sung (User specific)
            { id: 'IT3160', name: 'Nhập môn Trí tuệ nhân tạo', credits: 3, category: 'bosung', locked: true },
            { id: 'IT4735', name: 'Internet vạn vật và ứng dụng', credits: 2, category: 'bosung', locked: true },
            { id: 'IT4611', name: 'Các hệ thống phân tán và ứng dụng', credits: 2, category: 'bosung', locked: true },
            
            // Khối Chung
            { id: 'SS6013', name: 'Triết học', credits: 3, category: 'chung', locked: true },
            
            // Khối Ngành Rộng (12TC: 6TC bắt buộc + 6TC tự chọn)
            { id: 'DX6000', name: 'Đồ án đề xuất', credits: 6, category: 'rong', locked: true },
            { id: 'IT4263', name: 'An ninh mạng', credits: 3, category: 'rong' },
            { id: 'IT4409', name: 'Công nghệ Web và dịch vụ trực tuyến', credits: 3, category: 'rong' },
            { id: 'IT4210', name: 'Hệ nhúng', credits: 3, category: 'rong' },
            { id: 'IT4931', name: 'Lưu trữ và Xử lý dữ liệu lớn', credits: 3, category: 'rong' },
            { id: 'IT4025', name: 'Mật mã ứng dụng', credits: 3, category: 'rong' },
            { id: 'IT4785', name: 'Phát triển ứng dụng cho thiết bị di động', credits: 2, category: 'rong' },
            { id: 'IT4831', name: 'Phòng chống tấn công mạng', credits: 2, category: 'rong' },
            { id: 'IT4651', name: 'Thiết kế và triển khai mạng IP', credits: 3, category: 'rong' },
            { id: 'IT4681', name: 'Truyền thông đa phương tiện', credits: 3, category: 'rong' },

            // Khối Nâng cao (15TC Bắt buộc toàn bộ)
            { id: 'IT5320', name: 'An toàn thông tin cho IoT', credits: 2, category: 'nangcao', locked: true },
            { id: 'IT5421', name: 'Chuyên đề nghiên cứu 1', credits: 3, category: 'nangcao', locked: true },
            { id: 'IT5422', name: 'Chuyên đề nghiên cứu 2', credits: 3, category: 'nangcao', locked: true },
            { id: 'IT6820', name: 'Kiến trúc máy tính tiên tiến', credits: 2, category: 'nangcao', locked: true },
            { id: 'IT4922', name: 'Mạng thế hệ sau', credits: 2, category: 'nangcao', locked: true },
            { id: 'IT5208', name: 'Thống kê ứng dụng', credits: 3, category: 'nangcao', locked: true },

            // Khối Mô-đun (Chọn 15TC)
            { id: 'IT6160', name: 'AI trong An toàn thông tin', credits: 2, category: 'modun' },
            { id: 'IT4527', name: 'BlockChain và ứng dụng', credits: 2, category: 'modun' },
            { id: 'IT5310', name: 'Các công nghệ truyền thông cho IoT', credits: 3, category: 'modun' },
            { id: 'IT5550', name: 'Các giải pháp và chính sách an ninh mạng', credits: 3, category: 'modun' },
            { id: 'IT4653', name: 'Học sâu và ứng dụng', credits: 2, category: 'modun' },
            { id: 'IT6130.23', name: 'Lập trình và ảo hóa cho IoT (3TC)', credits: 3, category: 'modun' },
            { id: 'IT6130', name: 'Lập trình và ảo hóa cho IoT (2TC)', credits: 2, category: 'modun' },
            { id: 'IT5425', name: 'Quản trị dữ liệu và trực quan hóa', credits: 2, category: 'modun' },
            { id: 'IT5409', name: 'Thị giác máy tính', credits: 3, category: 'modun' },
            { id: 'IT5427', name: 'Tích hợp và xử lý dữ liệu lớn', credits: 3, category: 'modun' },

            // Luận văn
            { id: 'LV6001', name: 'Luận văn tốt nghiệp', credits: 15, category: 'luanvan', locked: true },
        ];

        const CATEGORIES = [
            { id: 'chung', name: 'Kiến thức chung', req: 3, color: 'bg-slate-500', text: 'text-slate-700', bg: 'bg-slate-100' },
            { id: 'rong', name: 'Ngành rộng (Gồm ĐA Đề xuất)', req: 12, color: 'bg-blue-500', text: 'text-blue-700', bg: 'bg-blue-50' },
            { id: 'nangcao', name: 'Ngành nâng cao', req: 15, color: 'bg-purple-500', text: 'text-purple-700', bg: 'bg-purple-50' },
            { id: 'modun', name: 'Mô-đun định hướng (Tự chọn)', req: 15, color: 'bg-emerald-500', text: 'text-emerald-700', bg: 'bg-emerald-50' },
            { id: 'luanvan', name: 'Luận văn tốt nghiệp', req: 15, color: 'bg-amber-500', text: 'text-amber-700', bg: 'bg-amber-50' },
            { id: 'bosung', name: 'Học bổ sung (Ngành gần)', req: 7, color: 'bg-orange-500', text: 'text-orange-700', bg: 'bg-orange-50' },
        ];

        function App() {
            const [plannedCourses, setPlannedCourses] = useState(() => {
                // Đổi key để reset lại trạng thái cũ bị ép chọn
                const saved = localStorage.getItem('hust_aiot_v4');
                if (saved) return JSON.parse(saved);
                
                // Trả về object rỗng hoàn toàn để user tự chọn từ đầu
                return {};
            });
            const [activeTab, setActiveTab] = useState('all');

            useEffect(() => {
                localStorage.setItem('hust_aiot_v4', JSON.stringify(plannedCourses));
            }, [plannedCourses]);

            const stats = useMemo(() => {
                const current = { 
                    masterTotal: 0, 
                    bonusTotal: 0,  
                    categories: {}, 
                    gpaTotalScore: 0, 
                    gpaTotalCredits: 0 
                };
                CATEGORIES.forEach(c => current.categories[c.id] = 0);

                Object.entries(plannedCourses).forEach(([courseId, data]) => {
                    const course = COURSES.find(c => c.id === courseId);
                    if (course) {
                        current.categories[course.category] += course.credits;
                        
                        if (course.category === 'bosung') {
                            current.bonusTotal += course.credits;
                        } else {
                            current.masterTotal += course.credits;
                        }

                        // Tính GPA (Cả môn bổ sung nếu có điểm)
                        if (data.grade !== '' && !isNaN(data.grade)) {
                            current.gpaTotalCredits += course.credits;
                            current.gpaTotalScore += parseFloat(data.grade) * course.credits;
                        }
                    }
                });

                current.gpa = current.gpaTotalCredits > 0 
                    ? (current.gpaTotalScore / current.gpaTotalCredits).toFixed(2) 
                    : '0.00';
                
                return current;
            }, [plannedCourses]);

            const addCourse = (courseId) => {
                setPlannedCourses(prev => ({ ...prev, [courseId]: { semester: 1, grade: '' } }));
            };
            
            const removeCourse = (courseId) => {
                const newPlan = { ...plannedCourses };
                delete newPlan[courseId];
                setPlannedCourses(newPlan);
            };

            const updateData = (courseId, field, value) => {
                setPlannedCourses(prev => ({ 
                    ...prev, 
                    [courseId]: { ...prev[courseId], [field]: field === 'semester' ? parseInt(value) : value } 
                }));
            };

            const isCoursePlanned = (courseId) => plannedCourses.hasOwnProperty(courseId);

            const semesterPlans = [1, 2, 3, 4].map(sem => ({
                semester: sem,
                courses: Object.entries(plannedCourses)
                    .filter(([_, data]) => data.semester === sem)
                    .map(([id, data]) => ({ ...COURSES.find(c => c.id === id), ...data }))
                    .filter(c => c.id)
                    .sort((a,b) => a.category.localeCompare(b.category)) // Nhóm theo loại
            }));

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Header */}
                    <header className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-red-700 p-3 rounded-xl shadow-inner text-white">
                                <i className="fas fa-user-graduate text-3xl"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">Kế hoạch Học tập Cá nhân</h1>
                                <p className="text-slate-500 font-medium mt-1">ĐH Bách Khoa Hà Nội • Thạc sĩ AIoT (Nhóm B)</p>
                            </div>
                        </div>
                        <div className="flex gap-4 w-full md:w-auto">
                            <div className="bg-white px-5 py-2.5 rounded-xl border border-slate-200 shadow-sm flex-1 md:flex-none text-center">
                                <p className="text-xs uppercase font-bold text-slate-400 mb-0.5">Tiến độ Thạc sĩ</p>
                                <p className="text-xl font-black text-slate-700">
                                    <span className={stats.masterTotal === 60 ? 'text-green-600' : 'text-indigo-600'}>{stats.masterTotal}</span>/60
                                </p>
                            </div>
                            <div className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl shadow-md flex-1 md:flex-none text-center">
                                <p className="text-xs uppercase font-bold opacity-80 mb-0.5">GPA Tích lũy</p>
                                <p className="text-xl font-black">{stats.gpa}</p>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* CỘT TRÁI: THEO DÕI & CHỌN MÔN */}
                        <div className="lg:col-span-5 flex flex-col gap-6">
                            
                            {/* Thanh tiến độ chi tiết */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                                    <i className="fas fa-list-check text-indigo-500"></i> Yêu cầu tín chỉ
                                </h2>
                                <div className="space-y-4">
                                    {CATEGORIES.map(cat => {
                                        const isComplete = stats.categories[cat.id] >= cat.req;
                                        const overLimit = stats.categories[cat.id] > cat.req;
                                        const percent = Math.min(100, (stats.categories[cat.id] / cat.req) * 100);
                                        
                                        return (
                                            <div key={cat.id}>
                                                <div className="flex justify-between text-sm mb-1">
                                                    <span className="font-semibold text-slate-700 flex items-center gap-2">
                                                        <div className={`w-3 h-3 rounded-md ${cat.color}`}></div>
                                                        {cat.name}
                                                    </span>
                                                    <span className={`font-bold ${isComplete ? (overLimit ? 'text-orange-500' : 'text-green-500') : 'text-slate-500'}`}>
                                                        {stats.categories[cat.id]} / {cat.req}
                                                        {isComplete && !overLimit && <i className="fas fa-check-circle ml-1"></i>}
                                                    </span>
                                                </div>
                                                <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                                    <div className={`${isComplete ? 'bg-green-500' : cat.color} h-2 transition-all`} style={{ width: `${percent}%` }}></div>
                                                </div>
                                                {/* Cảnh báo thiếu/thừa tín chỉ cho phần Tự chọn */}
                                                {!isComplete && (cat.id === 'rong' || cat.id === 'modun') && (
                                                    <p className="text-[10px] text-red-500 mt-1 italic">* Cần chọn thêm {cat.req - stats.categories[cat.id]} TC</p>
                                                )}
                                                {overLimit && (cat.id === 'rong' || cat.id === 'modun') && (
                                                    <p className="text-[10px] text-orange-500 mt-1 italic">* Dư {stats.categories[cat.id] - cat.req} TC (sẽ tính phí thêm)</p>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Danh sách môn học để chọn */}
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex-1 flex flex-col h-[550px]">
                                <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-800">
                                    <i className="fas fa-book-open text-indigo-500"></i> Cửa hàng môn học
                                </h2>
                                
                                <div className="flex gap-2 overflow-x-auto pb-2 mb-4 scrollbar-hide border-b border-slate-100">
                                    <button onClick={() => setActiveTab('all')} className={`px-3 py-1.5 text-sm font-bold rounded-t-lg border-b-2 whitespace-nowrap ${activeTab === 'all' ? 'border-indigo-500 text-indigo-700' : 'border-transparent text-slate-400'}`}>Tất cả</button>
                                    <button onClick={() => setActiveTab('rong')} className={`px-3 py-1.5 text-sm font-bold rounded-t-lg border-b-2 whitespace-nowrap ${activeTab === 'rong' ? 'border-indigo-500 text-indigo-700' : 'border-transparent text-slate-400'}`}>Tự chọn: Ngành rộng</button>
                                    <button onClick={() => setActiveTab('modun')} className={`px-3 py-1.5 text-sm font-bold rounded-t-lg border-b-2 whitespace-nowrap ${activeTab === 'modun' ? 'border-indigo-500 text-indigo-700' : 'border-transparent text-slate-400'}`}>Tự chọn: Mô-đun</button>
                                </div>

                                <div className="overflow-y-auto flex-1 pr-2 space-y-3 custom-scrollbar">
                                    {COURSES.filter(c => activeTab === 'all' ? true : c.category === activeTab).map(course => {
                                        const cat = CATEGORIES.find(c => c.id === course.category);
                                        const isAdded = isCoursePlanned(course.id);
                                        
                                        return (
                                            <div key={course.id} className={`p-3 rounded-xl border-2 transition-all ${isAdded ? 'border-slate-100 bg-slate-50 opacity-60' : `border-${cat.color.split('-')[1]}-100 bg-white hover:border-${cat.color.split('-')[1]}-300 hover:shadow-md cursor-pointer`}`}
                                                 onClick={() => !isAdded ? addCourse(course.id) : null}>
                                                <div className="flex justify-between items-start">
                                                    <div className="flex-1 pr-3">
                                                        <div className="flex items-center gap-2 mb-1.5">
                                                            <span className={`text-[10px] uppercase font-extrabold px-2 py-0.5 rounded ${cat.bg} ${cat.text}`}>{cat.name}</span>
                                                            {course.locked && <span className="text-[10px] bg-red-100 text-red-600 font-bold px-2 py-0.5 rounded"><i className="fas fa-lock mr-1"></i>BẮT BUỘC</span>}
                                                        </div>
                                                        <h3 className={`font-bold text-sm ${isAdded ? 'text-slate-500' : 'text-slate-800'}`}>{course.name}</h3>
                                                        <p className="text-xs font-medium text-slate-500 mt-1"><i className="fas fa-hashtag text-[10px] opacity-50 mr-1"></i>{course.id} • <i className="far fa-clock text-[10px] opacity-50 mx-1"></i>{course.credits} TC</p>
                                                    </div>
                                                    
                                                    <button 
                                                        onClick={(e) => { e.stopPropagation(); isAdded ? removeCourse(course.id) : addCourse(course.id); }}
                                                        className={`shrink-0 w-8 h-8 flex items-center justify-center rounded-full transition-colors ${isAdded ? 'bg-slate-200 text-slate-500 hover:bg-red-100 hover:text-red-600' : 'bg-indigo-100 text-indigo-600 hover:bg-indigo-600 hover:text-white'}`}
                                                    >
                                                        <i className={`fas ${isAdded ? 'fa-minus' : 'fa-plus'}`}></i>
                                                    </button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* CỘT PHẢI: XẾP LỊCH & NHẬP ĐIỂM */}
                        <div className="lg:col-span-7">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 h-full">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2 text-slate-800 border-b border-slate-100 pb-4">
                                    <i className="fas fa-calendar-alt text-indigo-500"></i> Lộ trình & Kết quả
                                </h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    {semesterPlans.map(plan => {
                                        const totalSemCredits = plan.courses.reduce((sum, c) => sum + c.credits, 0);
                                        return (
                                            <div key={plan.semester} className="bg-slate-50 rounded-xl border border-slate-200 p-4 flex flex-col shadow-inner">
                                                <div className="flex justify-between items-center mb-4 border-b border-slate-200 pb-2">
                                                    <h3 className="font-extrabold text-slate-700 uppercase tracking-wide text-sm flex items-center gap-2">
                                                        <i className="fas fa-flag text-indigo-400"></i> Học kỳ {plan.semester}
                                                    </h3>
                                                    <span className={`text-xs font-black px-2.5 py-1 rounded-md ${totalSemCredits > 0 ? 'bg-indigo-500 text-white shadow-sm' : 'bg-slate-200 text-slate-400'}`}>
                                                        {totalSemCredits} TC
                                                    </span>
                                                </div>
                                                
                                                <div className="flex-1 flex flex-col gap-3 min-h-[150px]">
                                                    {plan.courses.length === 0 ? (
                                                        <div className="flex-1 flex items-center justify-center border-2 border-dashed border-slate-200 rounded-xl bg-white/50">
                                                            <p className="text-sm text-slate-400 font-medium">Trống</p>
                                                        </div>
                                                    ) : (
                                                        plan.courses.map(course => {
                                                            const cat = CATEGORIES.find(c => c.id === course.category);
                                                            const isCompleted = course.grade !== '' && !isNaN(course.grade);

                                                            return (
                                                                <div key={course.id} className={`bg-white border-l-4 ${isCompleted ? 'border-l-green-400 border-y border-r border-slate-200 bg-green-50/20' : `border-l-${cat.color.split('-')[1]}-400 border-y border-r border-slate-200`} rounded-r-lg p-3 shadow-sm relative group`}>
                                                                    
                                                                    <button onClick={() => removeCourse(course.id)} className="absolute top-2 right-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                        <i className="fas fa-times-circle text-lg"></i>
                                                                    </button>

                                                                    <div className="pr-6">
                                                                        <h4 className="text-sm font-bold text-slate-800 leading-tight mb-1">{course.name}</h4>
                                                                        <div className="flex items-center gap-2 text-[10px] font-medium text-slate-500 mb-2">
                                                                            <span className={`px-1.5 py-0.5 rounded ${cat.bg} ${cat.text}`}>{cat.name}</span>
                                                                            <span>• {course.id}</span>
                                                                            <span>• {course.credits} TC</span>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    <div className="flex items-center justify-between gap-2 mt-2 pt-2 border-t border-slate-100">
                                                                        <div className="flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded border border-slate-200">
                                                                            <i className="fas fa-random text-[10px] text-slate-400"></i>
                                                                            <select 
                                                                                value={plan.semester}
                                                                                onChange={(e) => updateData(course.id, 'semester', e.target.value)}
                                                                                className="text-xs bg-transparent text-slate-700 font-bold focus:outline-none cursor-pointer"
                                                                            >
                                                                                {[1, 2, 3, 4].map(s => <option key={s} value={s}>Kỳ {s}</option>)}
                                                                            </select>
                                                                        </div>
                                                                        
                                                                        <div className="flex items-center gap-1.5">
                                                                            <span className="text-[10px] font-bold text-slate-400 uppercase">Điểm:</span>
                                                                            <input 
                                                                                type="number" 
                                                                                step="0.1" min="0" max="10" placeholder="-"
                                                                                value={course.grade}
                                                                                onChange={(e) => updateData(course.id, 'grade', e.target.value)}
                                                                                className={`text-sm w-14 text-center border rounded px-1 py-0.5 focus:outline-none focus:ring-2 focus:ring-indigo-400 font-black transition-colors ${isCompleted ? 'border-green-400 text-green-700 bg-green-100' : 'border-slate-200 text-slate-700'}`}
                                                                            />
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
